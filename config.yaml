# 博主订阅列表
# platform: bilibili / xiaohongshu / zhihu
# id: 用户 ID（B站=UID, 小红书=user_id, 知乎=url_token）
# name: 显示名称

subscriptions:
  bilibili:
    - id: "456664753"
      name: "罗翔说刑法"
    - id: "946974"
      name: "老番茄"
    - id: "8047632"
      name: "哔哩哔哩番剧"

  xiaohongshu:
    # - id: "5f1e3b0a0000000001001e6a"
    #   name: "示例博主"

  zhihu:
    # - id: "zhang-jia-wei"
    #   name: "张佳玮"

# 爬虫配置
crawler:
  min_interval: 5       # 最小请求间隔（秒）
  max_interval: 15      # 最大请求间隔（秒）
  max_retries: 3        # 单次请求最大重试
  timeout: 30           # 请求超时（秒）

# 小红书配置
xiaohongshu:
  api_fail_threshold: 3  # API 连续失败多少次后降级到 Playwright
  use_playwright: false  # 是否强制使用 Playwright

# DeepSeek 配置
deepseek:
  model: "deepseek-chat"
  max_tokens: 2000
  temperature: 0.7

# Feed 配置
feed:
  title: "个人内容聚合日报"
  description: "跨平台订阅内容 + AI 每日摘要"
  link: "https://github.com/terong/content-digest"
  language: "zh-CN"
  max_items: 200       # Feed 中最多保留多少条
  max_days: 7           # 最多保留多少天的内容
