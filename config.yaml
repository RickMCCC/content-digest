# 爬虫配置
crawler:
  min_interval: 5       # 最小请求间隔（秒）
  max_interval: 15      # 最大请求间隔（秒）
  max_retries: 3        # 单次请求最大重试
  timeout: 30           # 请求超时（秒）

# DeepSeek 配置
deepseek:
  model: "deepseek-flash"
  max_tokens: 2000
  temperature: 0.7

# Feed 配置
feed:
  title: "个人内容聚合日报"
  description: "跨平台订阅内容 + AI 每日摘要"
  link: "https://github.com/RickMCCC/content-digest"
  language: "zh-CN"
  max_items: 200       # 每个 Feed 最多保留多少条
  max_days: 7           # 最多保留多少天的内容

  streams:
    tech:
      file: "feed_tech.xml"
      title: "技术资讯信息"
      description: "AI/科技/财经 内容聚合"
    life:
      file: "feed_life.xml"
      title: "生活分享信息"
      description: "生活/娱乐/艺术 内容聚合"
