name: Daily Content Digest

on:
  schedule:
    - cron: '30 21 * * *'   # UTC 21:30 = 北京时间 5:30
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright (optional, for XHS fallback)
        run: |
          python -m playwright install --with-deps chromium 2>/dev/null || echo "Playwright install skipped (not needed for normal run)"

      - name: Run content digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          XIAOHONGSHU_COOKIE: ${{ secrets.XIAOHONGSHU_COOKIE }}
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/content.db output/feed.xml
          git diff --staged --quiet || git commit -m "Update feed and database [skip ci]"
          git push
